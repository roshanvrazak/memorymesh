name: memorymesh

services:
  backend:
    volumes: []
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: always
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]

  frontend:
    restart: always

  postgres:
    restart: always

  redis:
    restart: always
